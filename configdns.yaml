- name: "♻️ 美国自动"
  type: url-test
  include-all: true
  tolerance: 20
  interval: 300
  filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"
- name: "♻️ 自动选择"
  type: url-test
  include-all: true
  tolerance: 20
  interval: 300
  filter: "^((?!(直连)).)*$"
- name: "\U0001F310 全部节点"
  type: select
  include-all: true
