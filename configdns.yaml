- name: "♻️ 香港自动"
  type: url-test
  include-all: true
  tolerance: 20
  interval: 300
  filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"
- name: "♻️ 日本自动"
