# [šź»ňĆúŔ«żšŻ«]
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

# [ÚÇÜšöĘŔ«żšŻ«]
udp: true
mode: rule
ipv6: false
allow-lan: true
log-level: info
unified-delay: true
tcp-concurrent: true
geodata-loader: standard
find-process-mode: strict
global-client-fingerprint: chrome
external-controller: 0.0.0.0:9090

# [GEOŔ«żšŻ«]
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat
  geosite: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat
  mmdb: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb
  asn: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb

# [š╝ôňşśŔ«żšŻ«]
profile:
  store-selected: true
  store-fake-ip: true

# [ňŚůŠÄóŔ«żšŻ«]
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - "+.push.apple.com"

# [TUNŔ«żšŻ«]
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true

# [DNSŔ«żšŻ«]
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver:
  - https://223.5.5.5/dns-query
  proxy-server-nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  direct-nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  nameserver:
  - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
  - rule-set:fakeipfilter_domain

