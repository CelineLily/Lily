# [端口设置]
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

# [通用设置]
mode: rule
bind-address: "*"
ipv6: false
allow-lan: true
udp: true
tcp-concurrent: true
keep-alive-interval: 15
keep-alive-idle: 600
geodata-loader: standard
find-process-mode: strict
unified-delay: true
global-client-fingerprint: chrome
log-level: info
external-controller: 0.0.0.0:9090

# [GEO设置]
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat
  geosite: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat
  mmdb: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb
  asn: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb

# [缓存设置]
profile:
  store-selected: true
  store-fake-ip: true

# [嗅探设置]
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - "+.push.apple.com"

# [TUN设置]
tun:
  enable: true
  stack: mixed
  device: utun
  dns-hijack:
  - 127.0.0.1:53
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

# [DNS设置]
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-filter:
  - "*"
  - "+.lan"
  - "+.local"
  - "+.market.xiaomi.com"
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fake-ip-range: 198.18.0.1/16

# [策略组]
proxy-groups:
- name: Celine.Lily
  type: select
  icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png
  proxies:
  - 香港
  - 日本
  - 美国
  - 新加坡

- name: Emby
  type: select
  icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png
  proxies:
