# [订阅节点]
proxy-providers:
  Corn Group:
    url: "https://www.corninhi.com/s/nc25dd4u88tk"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

  Ash:
    url: "https://ashe79d4ui57uxa26luw.ivvocl.cn/tlralg/oahrettss/ecywtwcaaasr?token=MTQwNDA6ODMzMjY2ODYxMDE2OWIwZWUwNTFiNDA4OTgxYjI2YjI2NDAxODJiZA"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

# [节点信息]
proxies:
  - name: 直连
    type: direct

# [端口设置]
port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 7891
tproxy-port: 7892

# [通用设置]
mode: rule
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15

# [外部控制]
external-ui: ui
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-controller: '[::]:9090'
secret: "100000"

# [缓存设置]
profile:
  store-selected: true
  store-fake-ip: true

# [GEO设置]
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
  asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

# [嗅探设置]
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# [TUN设置]
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  device: nikki
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# [DNS设置]
dns:
  enable: true
  cache-algorithm: arc
  listen: '[::]:1053'
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"

# [策略组]
proxy-groups:
  - name: 全球手动选择
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png
    proxies:
      - 香港
      - 日本
      - 美国
      - 新加坡

  - name: Emby
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png
    proxies:
      - DIRECT
      - 香港
      - 日本
      - 美国
      - 新加坡

  - name: Xbox
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Xbox.png
    proxies:
      - DIRECT
      - 香港
      - 日本
      - 美国
      - 新加坡

  - name: 香港
    type: url-test
    include-all: true
    interval: 300
    tolerance: 20
    filter: "(?i)港|hk|hong kong"
    url: "https://cp.cloudflare.com/generate_204"
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png

  - name: 日本
    type: url-test
    include-all: true
    interval: 300
    tolerance: 20
    filter: "(?i)日|jp|japan"
    url: "https://cp.cloudflare.com/generate_204"
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png

  - name: 美国
    type: url-test
    include-all: true
    interval: 300
    tolerance: 20
    filter: "(?i)美|us|united states"
    url: "https://cp.cloudflare.com/generate_204"
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png

  - name: 新加坡
    type: url-test
    include-all: true
    interval: 300
    tolerance: 20
    filter: "(?i)新|sg|singapore"
    url: "https://cp.cloudflare.com/generate_204"
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png

# [远程规则]
rule-providers:
  fakeipfilter_domain:
    url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"
    type: http
    behavior: domain
    interval: 86400
    format: mrs

  Emby:
    url: "https://raw.githubusercontent.com/CelineLily/Lily/refs/heads/main/Emby.yaml"
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  Xbox:
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Xbox/Xbox.yaml"
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  AdRules:
    url: "https://adrules.top/adrules-mihomo.mrs"
    type: http
    behavior: domain
    interval: 86400
    format: mrs

  Apple:
    url: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/refs/heads/master/Clash/Ruleset/Apple.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  LAN:
    url: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Clash/Ruleset/LAN.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

# [规则走向]
rules:
  - DOMAIN,gst.prod.dl.playstation.net,直连
  - RULE-SET,AdRules,REJECT
  - RULE-SET,Emby,Emby
  - RULE-SET,Xbox,Xbox
  - RULE-SET,Apple,直连
  - RULE-SET,LAN,直连
  - GEOIP,CN,直连
  - MATCH,全球手动选择