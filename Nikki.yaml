    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# [TUNŔ«żšŻ«]
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
