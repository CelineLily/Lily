# [订阅节点]
proxy-providers:
  Corn Group:
    url: https://www.corninhi.com/s/nc25dd4u88tk
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "[Corn Group]"
    path: "./proxy_provider/Corn Group"

  Ash:
    url: https://ashe79d4ui57uxa26luw.ivvocl.cn/tlralg/oahrettss/ecywtwcaaasr?token=0c9252e949403ff1b3beb95ed7f1ec20
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "[Ash]"
    path: "./proxy_provider/Ash"

mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
# [策略组]
proxy-groups:
- name: 全球手动选择
  type: select
  icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png
  proxies:
  - 香港
  - 日本
  - 美国
  - 新加坡

- name: Emby
  type: select
  icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png
  proxies:
  - DIRECT
  - 香港
  - 日本
  - 美国
  - 新加坡

- name: Netflix
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Netflix.png
  proxies:
  - 新加坡
  - 香港
  - 日本
  - 美国

- name: 香港
  type: url-test
  include-all: true
  interval: 300
  tolerance: 20
  filter: "(?i)港|hk|hong kong"
  url: https://cp.cloudflare.com/generate_204
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png

- name: 日本
  type: url-test
  include-all: true
  interval: 300
  tolerance: 20
  filter: "(?i)日|jp|japan"
  url: https://cp.cloudflare.com/generate_204
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png

- name: 美国
  type: url-test
  include-all: true
  interval: 300
  tolerance: 20
  filter: "(?i)美|us|united states"
  url: https://cp.cloudflare.com/generate_204
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png

- name: 新加坡
  type: url-test
  include-all: true
  interval: 300
  tolerance: 20
  filter: "(?i)新|sg|singapore"
  url: https://cp.cloudflare.com/generate_204
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png

# [远程规则]
rule-providers:
  fakeipfilter_domain:
    path: "./rule_provider/fakeipfilter_domain"
    url: https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs
    type: http
    behavior: domain
    interval: 86400
    format: mrs

  Emby:
    path: "./rule_provider/Emby.yaml"
    url: https://raw.githubusercontent.com/CelineLily/Lily/refs/heads/main/Emby.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  Apple:
    path: "./rule_provider/Apple.yaml"
    url: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/refs/heads/master/Clash/Ruleset/Apple.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  Netflix:
    path: "./rule_provider/Netflix.yaml"
    url: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/refs/heads/master/Clash/Ruleset/Netflix.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  LAN:
    path: "./rule_provider/Lan.yaml"
    url: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Clash/Ruleset/LAN.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

# [规则走向]
rules:
- RULE-SET,LAN,DIRECT
- DOMAIN,gst.prod.dl.playstation.net,DIRECT
- RULE-SET,Emby,Emby
- RULE-SET,Apple,DIRECT
- RULE-SET,Netflix,Netflix
- GEOIP,CN,DIRECT
- MATCH,全球手动选择
