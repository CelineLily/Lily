# [节点信息]
proxies:
  - {name: 直连, type: direct}

# [全局配置]
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15

# [缓存设置]
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# [嗅探设置]
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# [TUN设置]
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# [DNS设置]
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"

# [策略组]
proxy-groups:
- name: 全球手动选择
  type: select
  icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png
  proxies:
  - 香港
  - 日本
  - 美国
  - 新加坡

- name: Emby
  type: select
  icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png
  proxies:
  - 香港
  - 日本
  - 美国
  - 新加坡

- name: Netflix
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Netflix.png
  proxies:
  - 新加坡
  - 香港
  - 日本
  - 美国

- name: 香港
  type: url-test
  include-all: true
  interval: 1800
  tolerance: 50
  filter: "(?i)港|hk|hong kong"
  url: "https://cp.cloudflare.com/generate_204"
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png

- name: 日本
  type: url-test
  include-all: true
  interval: 1800
  tolerance: 50
  filter: "(?i)日|jp|japan"
  url: "https://cp.cloudflare.com/generate_204"
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png

- name: 美国
  type: url-test
  include-all: true
  interval: 1800
  tolerance: 50
  filter: "(?i)美|us|united states"
  url: "https://cp.cloudflare.com/generate_204"
