# [订阅节点]
proxy-providers:
  Corn Group:
    url: https://www.corninhi.com/s/nc25dd4u88tk
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "[Corn Group]"
    path: "./proxy_provider/Corn Group"

proxy-providers:
  Ash:
    url: https://ashe79d4ui57uxa26luw.ivvocl.cn/tlralg/oahrettss/ecywtwcaaasr?token=0c9252e949403ff1b3beb95ed7f1ec20
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "[Ash]"
    path: "./proxy_provider/Ash"

# [端口设置]
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

# [通用设置]
log-level: info
mode: rule
bind-address: "*"
ipv6: false
allow-lan: true
udp: true
tcp-concurrent: true
keep-alive-interval: 15
keep-alive-idle: 600
geodata-loader: standard
find-process-mode: strict
unified-delay: true
global-client-fingerprint: chrome

# [缓存设置]
profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100.0

# [面板设置]
external-controller: 0.0.0.0:9090
secret: 
external-ui: "/usr/share/openclash/ui"
external-ui-name: metacubexd

# [LightGBM模型]
lgbm-auto-update: true
lgbm-update-interval: 24
lgbm-url: https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin

# [GEO设置]
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat
  geosite: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat
  mmdb: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb
  asn: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb

# [嗅探设置]
sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
      - 443
    TLS:
      ports:
      - 443
      - 8443
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
  force-domain:
  - "+.netflix.com"
  - "+.nflxvideo.net"
  - "+.amazonaws.com"
  - "+.media.dssott.com"
  skip-domain:
  - "+.apple.com"
  - Mijia Cloud
  - dlg.io.mi.com
  - "+.oray.com"
  - "+.sunlogin.net"
  - "+.push.apple.com"
  parse-pure-ip: true

# [TUN设置]
tun:
  enable: true
  stack: mixed
  device: utun
  dns-hijack:
  - 127.0.0.1:53
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

# [DNS设置]
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:7874
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  default-nameserver:
  - https://223.5.5.5/dns-query
  proxy-server-nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  direct-nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  nameserver:
  - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
  - rule-set:fakeipfilter_domain
  - geosite:cn

# [策略组]
proxy-groups:
- name: 全球手动选择
  type: select
  icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png
  proxies:
  - 香港
  - 日本
  - 美国
  - 新加坡

- name: Emby
  type: select
  icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png
  proxies:
  - DIRECT
  - 香港
  - 日本
  - 美国
  - 新加坡

- name: Netflix
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Netflix.png
  proxies:
  - 新加坡
  - 香港
  - 日本
  - 美国

- name: 香港
  type: smart
  include-all: true
  interval: 300
  tolerance: 20
  filter: "(?i)港|hk|hong kong"
  url: https://cp.cloudflare.com/generate_204
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
  uselightgbm: true
  collectdata: true
  strategy: sticky-sessions
  sample-rate: 1.0

- name: 日本
  type: smart
  include-all: true
  interval: 300
  tolerance: 20
  filter: "(?i)日|jp|japan"
  url: https://cp.cloudflare.com/generate_204
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
  uselightgbm: true
  collectdata: true
  strategy: sticky-sessions
  sample-rate: 1.0

- name: 美国
  type: smart
  include-all: true
  interval: 300
  tolerance: 20
  filter: "(?i)美|us|united states"
  url: https://cp.cloudflare.com/generate_204
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
  uselightgbm: true
  collectdata: true
  strategy: sticky-sessions
  sample-rate: 1.0

- name: 新加坡
  type: smart
  include-all: true
  interval: 300
  tolerance: 20
  filter: "(?i)新|sg|singapore"
  url: https://cp.cloudflare.com/generate_204
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
  uselightgbm: true
  collectdata: true
  strategy: sticky-sessions
  sample-rate: 1.0

# [远程规则]
rule-providers:
  fakeipfilter_domain:
    path: "./rule_provider/fakeipfilter_domain"
    url: https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs
    type: http
    behavior: domain
    interval: 86400
    format: mrs

  Emby:
    path: "./rule_provider/Emby.yaml"
    url: https://raw.githubusercontent.com/CelineLily/Lily/refs/heads/main/Emby.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  Apple:
    path: "./rule_provider/Apple.yaml"
    url: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/refs/heads/master/Clash/Ruleset/Apple.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  Netflix:
    path: "./rule_provider/Netflix.yaml"
    url: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/refs/heads/master/Clash/Ruleset/Netflix.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

  LAN:
    path: "./rule_provider/Lan.yaml"
    url: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Clash/Ruleset/LAN.yaml
    type: http
    behavior: classical
    interval: 86400
    format: yaml

# [规则走向]
rules:
- DOMAIN,gst.prod.dl.playstation.net,DIRECT
- RULE-SET,Emby,Emby
- RULE-SET,Apple,DIRECT
- RULE-SET,Netflix,Netflix
- RULE-SET,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,全球手动选择
